name: Build Technologies Soft to EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    # تم تغيير البيئة إلى windows-2022 لضمان وجود أدوات بناء C++ المتوافقة مع node-gyp
    runs-on: windows-2022 

    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: تثبيت Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: تهيئة أدوات بناء محرري لغة C++ وتحديث npm
        run: |
          npm config set msvs_version 2022
          npm install -g npm@latest
        shell: bash

      - name: تثبيت الاعتماديات
        run: |
          npm install

      - name: إعادة بناء الوحدات الأصلية (لتتناسب مع Electron)
        run: |
          npx electron-builder install-app-deps

      - name: بناء ملف التثبيت EXE
        run: |
          npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: رفع ملف التثبيت كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Technologies-Soft-Installer
          path: dist/*.exe
